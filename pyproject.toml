[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=100"

[tool.coverage.run]
source = ["src"]
# app.py is pure Streamlit UI wiring — impractical to unit-test meaningfully;
# all real logic lives in src/dashboard/data.py (fully covered).
# src/transforms/glue/*_job.py are Glue 5.0 entry-point scripts that import
# awsglue.* (only available in the Glue runtime) and call already-tested
# transforms unchanged — not runnable in CI.
omit = [
    "src/dashboard/app.py",
    "src/transforms/glue/*",
]

[tool.ruff]
line-length = 100
target-version = "py311"
# scripts/ holds one-off exploration tools — lint/format gates apply to pipeline code only
extend-exclude = ["scripts"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = "scripts/"

[tool.mypy]
python_version = "3.11"
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
